# Cloudflare Workers configuration

name = "clan-node"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "clan-db"
database_id = "local" # Replace with actual database_id after running `wrangler d1 create`

# R2 Binding (for avatars)
[[r2_buckets]]
binding = "AVATARS"
bucket_name = "clan-avatars"

[vars]
ENVIRONMENT = "development"
