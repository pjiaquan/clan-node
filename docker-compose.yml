services:
  clan-node:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ""
    container_name: clan-node
    restart: unless-stopped
    env_file:
      - ./selfhost.env
    environment:
      PORT: 8080
      CLAN_DATA_DIR: /var/lib/clan-node
    volumes:
      - clan_node_state:/var/lib/clan-node
    ports:
      - "${CLAN_HTTP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/healthz').then(r => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  clan_node_state:
